[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recusal"
version = "0.1.0"
description = "Lightweight, extensible, Claude-native governance for AI agents: an independent, deterministic verifier that can refuse to certify a tool call before it runs. Builders cannot grade their own work."
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }
authors = [{ name = "Philip Paz" }]
keywords = [
    "ai-agents", "agent-governance", "guardrails", "verifier", "determinism",
    "claude", "separation-of-powers", "runtime-governance", "agent-reliability",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = []  # zero runtime dependencies — standard library only

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.4"]

[project.urls]
Homepage = "https://github.com/philpaz/recusal"

[tool.hatch.build.targets.wheel]
packages = ["recusal"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]  # long doc/example lines are fine

[tool.ruff.lint.per-file-ignores]
"examples/*" = ["E402"]  # sys.path shim must precede imports in runnable examples
