name: Build distributions

# The release build and its provenance generation live HERE, in a reusable
# workflow, the pattern GitHub documents for SLSA v1 Build Level 3: the caller
# delegates the whole build job, the signing identity recorded in the provenance
# is THIS workflow's ref (job_workflow_ref), and a verifier can require it:
#   gh attestation verify dist/<file> --repo philpaz/recusal \
#     --signer-workflow philpaz/recusal/.github/workflows/build-dist.yml
# Stated narrowly: this pins WHICH workflow built and attested the artifacts; it
# does not make the build byte-reproducible, and a same-repo reusable workflow is
# only as isolated as the repository's own change controls (drift-locked tests,
# zizmor, SHA-pinned actions).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Provenance attestations are written to the repo's attestation store; both
      # grants exist only for actions/attest-build-provenance below.
      id-token: write
      attestations: write
    steps:
      # Actions are pinned to immutable commit SHAs (a moving tag is a rug-pull surface;
      # the trailing comment names the tag each SHA was resolved from).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false # no job here pushes; the default keeps a live token in .git
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      # Hash-locked: the Python BUILD and METADATA-CHECK dependency environment
      # installs from release-requirements.txt with --require-hashes (exact versions,
      # sha256 of every distribution file PyPI serves), and the build runs
      # --no-isolation so no second, uncontrolled PEP 517 dependency resolution
      # happens. Publishing is NOT in this lock: the publish job uses a separately
      # SHA-pinned GitHub Action via Trusted Publishing. Regenerate the lock
      # deliberately (scripted PyPI-metadata walk for ubuntu/cp312), review the diff,
      # commit. Stated narrowly: this pins what installs here; it does not make the
      # build output byte-reproducible (untested), and pip/setuptools on the runner
      # image are outside the lock.
      - name: Install build tooling (hash-locked)
        run: python -m pip install --require-hashes -r release-requirements.txt

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__ = \"([^\"]+)\"", open("recusal/__init__.py").read()).group(1))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match the package version source (recusal/__init__.py: $PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag $GITHUB_REF_NAME."

      - name: Build sdist and wheel (no uncontrolled isolation env)
        run: python -m build --no-isolation

      - name: Check metadata
        run: python -m twine check dist/*

      # The artifact that ships must import and name itself correctly OUTSIDE the
      # source tree (from the repo root, `import recusal` finds the checkout and the
      # check proves nothing about the wheel).
      - name: Verify the built wheel from a neutral directory
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install --quiet dist/*.whl
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__ = \"([^\"]+)\"", open("recusal/__init__.py").read()).group(1))')"
          GOT="$(cd /tmp && /tmp/wheelcheck/bin/python -c 'import recusal; print(recusal.__version__)')"
          if [ "$GOT" != "$PKG_VERSION" ]; then
            echo "::error::built wheel reports $GOT but the version source says $PKG_VERSION"
            exit 1
          fi
          (cd /tmp && /tmp/wheelcheck/bin/python -m recusal --version)
          (cd /tmp && /tmp/wheelcheck/bin/python -c 'from recusal.mcp import build_manifest, diff_manifest, diff_observation, diff_observation_scope, diff_resolved_executable, diff_source, load_manifest, manifest_policy, manifest_to_text, normalize_source, plugin_callable_name, screen_server_instructions, screen_tool_declarations, tool_fingerprint')

      # Supply-chain records for the exact bytes that ship (stated narrowly: the SBOM
      # catalogs the built distributions, and the attestation binds them to this
      # workflow run's provenance; neither makes the build byte-reproducible).
      - name: Generate SBOM for the built distributions
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: dist-sbom.spdx.json
          artifact-name: dist-sbom.spdx.json
          # The action's default also attaches the SBOM to the GitHub Release, which
          # needs contents: write; this job deliberately stays contents: read, so the
          # attach step is off and the SBOM ships as the workflow artifact above
          # (proven live: the v0.6.0 release event failed exactly there without this).
          upload-release-assets: false

      - name: Attest build provenance for the distributions
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dist
          path: dist/
