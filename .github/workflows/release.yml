name: Release

# Publish to PyPI via Trusted Publishing (OIDC), no API token stored in the repo.
# One-time setup on PyPI: create the `recusal` project's trusted publisher pointing at
#   owner: philpaz · repo: recusal · workflow: release.yml · environment: pypi
# Then publishing is automatic when you publish a GitHub Release (or push a v* tag).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # A release must prove the exact release commit passes the full gate before anything
  # is built or published: the builder does not certify its own work, and neither does
  # a release workflow that skipped the tests.
  test:
    name: Full suite at the release commit
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to immutable commit SHAs (a moving tag is a rug-pull surface;
      # the trailing comment names the tag each SHA was resolved from).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      # Hash-locked: the Python BUILD and METADATA-CHECK dependency environment
      # installs from release-requirements.txt with --require-hashes (exact versions,
      # sha256 of every distribution file PyPI serves), and the build runs
      # --no-isolation so no second, uncontrolled PEP 517 dependency resolution
      # happens. Publishing is NOT in this lock: the publish job uses a separately
      # SHA-pinned GitHub Action via Trusted Publishing. Regenerate the lock
      # deliberately (scripted PyPI-metadata walk for ubuntu/cp312), review the diff,
      # commit. Stated narrowly: this pins what installs here; it does not make the
      # build output byte-reproducible (untested), and pip/setuptools on the runner
      # image are outside the lock.
      - name: Install build tooling (hash-locked)
        run: python -m pip install --require-hashes -r release-requirements.txt

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__ = \"([^\"]+)\"", open("recusal/__init__.py").read()).group(1))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match the package version source (recusal/__init__.py: $PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag $GITHUB_REF_NAME."

      - name: Build sdist and wheel (no uncontrolled isolation env)
        run: python -m build --no-isolation

      - name: Check metadata
        run: python -m twine check dist/*

      # The artifact that ships must import and name itself correctly OUTSIDE the
      # source tree (from the repo root, `import recusal` finds the checkout and the
      # check proves nothing about the wheel).
      - name: Verify the built wheel from a neutral directory
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install --quiet dist/*.whl
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__ = \"([^\"]+)\"", open("recusal/__init__.py").read()).group(1))')"
          GOT="$(cd /tmp && /tmp/wheelcheck/bin/python -c 'import recusal; print(recusal.__version__)')"
          if [ "$GOT" != "$PKG_VERSION" ]; then
            echo "::error::built wheel reports $GOT but the version source says $PKG_VERSION"
            exit 1
          fi
          (cd /tmp && /tmp/wheelcheck/bin/python -m recusal --version)

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual release event, not on every tag push.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/recusal/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true # re-running a release whose version is already on PyPI is a no-op, not a failure
