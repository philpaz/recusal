name: Release

# Publish to PyPI via Trusted Publishing (OIDC), no API token stored in the repo.
# One-time setup on PyPI: create the `recusal` project's trusted publisher pointing at
#   owner: philpaz · repo: recusal · workflow: release.yml · environment: pypi
# Then publishing is automatic when you publish a GitHub Release (or push a v* tag).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # A release must prove the exact release commit passes the full gate before anything
  # is built or published: the builder does not certify its own work, and neither does
  # a release workflow that skipped the tests.
  test:
    name: Full suite at the release commit
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to immutable commit SHAs (a moving tag is a rug-pull surface;
      # the trailing comment names the tag each SHA was resolved from).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false  # no job here pushes; the default keeps a live token in .git
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest -q

  # The build and its provenance generation are DELEGATED to the reusable
  # build-dist.yml workflow (the pattern GitHub documents for SLSA v1 Build
  # Level 3): the provenance records that workflow's identity as the signer
  # (job_workflow_ref), so a verifier can require it:
  #   gh attestation verify dist/<file> --repo philpaz/recusal \
  #     --signer-workflow philpaz/recusal/.github/workflows/build-dist.yml
  build:
    name: Build distributions
    needs: test
    permissions:
      contents: read
      # granted THROUGH to build-dist.yml's job, which uses both only for
      # actions/attest-build-provenance
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-dist.yml

  # Signatures live at the release boundary, in CI, by decision (2026-07-23): the
  # runtime stays stdlib-pure and verifies nothing; what IS signed are the built
  # distributions, keylessly, with the bundles attached to the GitHub Release so a
  # verifier can fetch them offline (`sigstore verify github ...`). PyPI-side PEP 740
  # attestations are generated separately by the publish action below.
  sign:
    name: Sign the distributions (Sigstore)
    needs: build
    runs-on: ubuntu-latest
    # Only a published release has an asset list to attach bundles to.
    if: github.event_name == 'release'
    permissions:
      id-token: write # Sigstore keyless signing identity (OIDC)
      # ONLY to attach the .sigstore.json bundles to the triggering Release; the
      # sbom-action lesson applies: this is the one job that may write release
      # assets, and it writes nothing else.
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/
      - name: Sign sdist and wheel, attach bundles to the release
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: dist/*
          release-signing-artifacts: true

  publish:
    name: Publish to PyPI
    # a distribution that could not be signed must not publish: fail closed, a
    # human looks (signing and publishing share the release event, so a tag push
    # still rehearses build-only)
    needs: [build, sign]
    runs-on: ubuntu-latest
    # Only publish on an actual release event, not on every tag push.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/recusal/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Deliberately no skip-existing: re-running a release whose version is already on
        # PyPI must hard-fail so a divergent rebuild can never silently no-op over the
        # published artifacts; a failed re-run is a human-review signal, not an error to
        # suppress (review 9, publish hardening).
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
