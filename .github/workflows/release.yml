name: Release

# Publish to PyPI via Trusted Publishing (OIDC), no API token stored in the repo.
# One-time setup on PyPI: create the `recusal` project's trusted publisher pointing at
#   owner: philpaz · repo: recusal · workflow: release.yml · environment: pypi
# Then publishing is automatic when you publish a GitHub Release (or push a v* tag).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # A release must prove the exact release commit passes the full gate before anything
  # is built or published: the builder does not certify its own work, and neither does
  # a release workflow that skipped the tests.
  test:
    name: Full suite at the release commit
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to immutable commit SHAs (a moving tag is a rug-pull surface;
      # the trailing comment names the tag each SHA was resolved from).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      # Pinned exactly: a floating build toolchain is unreviewed code in the release
      # path. Versions are reviewed and bumped deliberately, like the action SHAs.
      - name: Install build tooling (pinned)
        run: python -m pip install build==1.5.1 twine==6.2.0

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(python -c 'import re; print(re.search(r"__version__ = \"([^\"]+)\"", open("recusal/__init__.py").read()).group(1))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match pyproject version $PKG_VERSION"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag $GITHUB_REF_NAME."

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual release event, not on every tag push.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/recusal/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true # re-running a release whose version is already on PyPI is a no-op, not a failure
