name: Release

# Publish to PyPI via Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup on PyPI: create the `recusal` project's trusted publisher pointing at
#   owner: philpaz · repo: recusal · workflow: release.yml · environment: pypi
# Then publishing is automatic when you publish a GitHub Release (or push a v* tag).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # Actions are tag-pinned (reference-architecture convention). For production
      # supply-chain hardening, pin each `uses:` to an immutable commit SHA.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match pyproject version $PKG_VERSION"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag $GITHUB_REF_NAME."

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual release event, not on every tag push.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/recusal/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # re-running a release whose version is already on PyPI is a no-op, not a failure
