name: CI

on:
  push:
    branches: [main]
  pull_request:

# least privilege: nothing in CI writes to the repo
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python sweep on Linux; a cross-platform smoke on macOS and Windows at one
        # version (the interpreter-probe launcher and the stdio fetcher have OS-specific
        # paths worth exercising on all three, without paying 3x for every Python).
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      # Actions are pinned to immutable commit SHAs (a moving tag is a rug-pull surface;
      # the trailing comment names the tag each SHA was resolved from).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest -q

  action-gate:
    name: Dogfood the GitHub Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install this checkout (the action must gate with THIS code, not PyPI)
        run: pip install -e .
      - name: Scaffold the gate (settings.json is deliberately not committed)
        run: python -m recusal init --dir .
      - name: Produce evidence to adjudicate
        run: |
          python - <<'PY'
          import json
          from recusal import AuditLog, Finding, compute_verdict

          log = AuditLog("/tmp/audit.jsonl")
          for i in range(3):
              verdict = compute_verdict([Finding.ok("ci_probe", severity="CRITICAL")])
              log.append(verdict, action={"i": i})
          with open("/tmp/findings.json", "w") as fh:
              json.dump([{"check": "suite", "severity": "CRITICAL", "status": "pass"}], fh)
          with open("/tmp/audit.jsonl") as fh:
              text = fh.read()
          with open("/tmp/tampered.jsonl", "w") as fh:
              fh.write(text.replace('"i": 1', '"i": 9'))
          PY
      - name: Gate (doctor + audit verify + verdict must all pass)
        uses: ./
        with:
          doctor-dir: "."
          audit-log: /tmp/audit.jsonl
          findings: /tmp/findings.json
          use-installed: "true" # this job gates with THIS checkout, named explicitly
      - name: Gate must refuse a tampered log
        id: tampered
        continue-on-error: true
        uses: ./
        with:
          audit-log: /tmp/tampered.jsonl
          use-installed: "true"
      - name: Assert the refusal happened
        if: steps.tampered.outcome != 'failure'
        run: |
          echo "::error::a tampered audit log passed the gate"
          exit 1

  action-provenance:
    name: Action ref selects the implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Produce findings
        run: echo '[{"check":"ci","severity":"CRITICAL","status":"pass"}]' > /tmp/f.json
      # Clean runner: nothing preinstalled, so the action MUST install its own bundled
      # source (the GITHUB_ACTION_PATH branch, which the dogfood job never exercises).
      - name: Gate on a clean runner
        uses: ./
        with:
          findings: /tmp/f.json
      - name: The executed implementation is this checkout's version
        # The version single-source is recusal/__init__.py (pyproject is dynamic), and
        # the INSTALLED import is probed from a neutral directory: from the repo root,
        # `import recusal` finds the checkout's source tree and the comparison proves
        # nothing about what was installed.
        run: |
          PKG="$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' recusal/__init__.py)"
          GOT="$(cd /tmp && python -c 'import recusal; print(recusal.__version__)')"
          if [ -z "$PKG" ] || [ "$PKG" != "$GOT" ]; then
            echo "::error::action executed recusal $GOT but the selected ref is $PKG"
            exit 1
          fi
      # Adversarial: a DIFFERENT recusal is already importable; without use-installed
      # the action must replace it, or the action ref no longer names the adjudicator.
      - name: Preinstall a conflicting older recusal
        run: python -m pip install --quiet --force-reinstall recusal==0.3.0
      - name: Gate must replace the conflicting package
        uses: ./
        with:
          findings: /tmp/f.json
      - name: The conflicting package did not run the gate
        run: |
          PKG="$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' recusal/__init__.py)"
          GOT="$(cd /tmp && python -c 'import recusal; print(recusal.__version__)')"
          if [ -z "$PKG" ] || [ "$PKG" != "$GOT" ]; then
            echo "::error::a preinstalled recusal $GOT survived; the ref is $PKG"
            exit 1
          fi

  # The hash-locked release environment must be provably installable and able to build
  # BEFORE a tag exists: a stale release-requirements.txt (yanked file, changed
  # dependency graph) must fail here, on push, never first at release time.
  release-env:
    name: Hash-locked release environment builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install the locked toolchain (--require-hashes)
        run: python -m pip install --require-hashes -r release-requirements.txt
      - name: Build with no uncontrolled isolation env
        run: python -m build --no-isolation
      - name: Check metadata
        run: python -m twine check dist/*
      - name: Installed wheel names itself correctly, probed outside the source tree
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install --quiet dist/*.whl
          PKG="$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' recusal/__init__.py)"
          GOT="$(cd /tmp && /tmp/wheelcheck/bin/python -c 'import recusal; print(recusal.__version__)')"
          if [ -z "$PKG" ] || [ "$PKG" != "$GOT" ]; then
            echo "::error::built wheel reports $GOT but the version source says $PKG"
            exit 1
          fi
          (cd /tmp && /tmp/wheelcheck/bin/python -c 'from recusal.mcp import build_manifest, diff_manifest, diff_observation, diff_source, load_manifest, manifest_policy, manifest_to_text, normalize_source, plugin_callable_name, screen_server_instructions, screen_tool_declarations, tool_fingerprint')
