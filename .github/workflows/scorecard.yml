name: Scorecard

# OpenSSF Scorecard: the project's supply-chain posture, measured continuously by
# tooling the maintainer does not control, published to the public scorecard API
# (the README badge reads it from there). The badge IS the claim; nothing in this
# repository asserts a score value.

on:
  schedule:
    - cron: "30 6 * * 1" # weekly; posture drift should surface without a push
  push:
    branches: [main]
  branch_protection_rule:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # publish_results uses OIDC to sign the results into the public scorecard API
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false # no job here pushes; the default keeps a live token in .git
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      # kept as a run artifact for review; SARIF is not uploaded to code scanning,
      # keeping this workflow's permission surface at id-token only
      - name: Upload the results artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: scorecard-results.sarif
          path: scorecard-results.sarif
